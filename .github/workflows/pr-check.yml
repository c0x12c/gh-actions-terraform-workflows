name: PR Check

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Comment Length Validation Tests
        run: node tests/test-comment-length.js

      - name: Run Backtick Escaping Tests
        run: node tests/test-backtick-escaping.js
